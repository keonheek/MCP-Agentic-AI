<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온기 카페 — 따뜻한 한 잔의 여유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --warm-brown: #6B4226;
    --cream: #F5ECD7;
    --light-cream: #FBF7F0;
    --dark-brown: #2C1A0E;
    --gold: #C8963E;
    --soft-white: #FEFCF9;
    --muted: #9E8A78;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', Helvetica, sans-serif;
    background: var(--soft-white);
    color: var(--dark-brown);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    z-index: 1000;
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(254, 252, 249, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(107, 66, 38, 0.08);
    transition: all 0.3s ease;
  }

  nav .logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--warm-brown);
    letter-spacing: -0.5px;
  }

  nav .logo span {
    color: var(--gold);
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 36px;
  }

  nav ul li a {
    text-decoration: none;
    font-size: 14px;
    font-weight: 400;
    color: var(--dark-brown);
    opacity: 0.7;
    transition: opacity 0.2s ease;
    letter-spacing: 0.02em;
  }

  nav ul li a:hover { opacity: 1; }

  .nav-cta {
    background: var(--warm-brown);
    color: var(--cream) !important;
    opacity: 1 !important;
    padding: 10px 22px;
    border-radius: 40px;
    font-weight: 500 !important;
    transition: background 0.2s ease, transform 0.2s ease !important;
  }

  .nav-cta:hover {
    background: var(--dark-brown) !important;
    transform: translateY(-1px);
  }

  /* HAMBURGER */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
  }

  .hamburger span {
    width: 24px;
    height: 2px;
    background: var(--warm-brown);
    border-radius: 2px;
    transition: all 0.3s ease;
    display: block;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 64px; left: 0;
    width: 100%;
    background: rgba(254, 252, 249, 0.97);
    backdrop-filter: blur(20px);
    z-index: 999;
    padding: 20px 0 30px;
    border-bottom: 1px solid rgba(107, 66, 38, 0.1);
  }

  .mobile-menu.open { display: block; }

  .mobile-menu ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .mobile-menu ul li a {
    display: block;
    padding: 14px 40px;
    text-decoration: none;
    font-size: 16px;
    color: var(--dark-brown);
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }

  .mobile-menu ul li a:hover { color: var(--warm-brown); }

  /* HERO */
  #hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #three-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 20px;
  }

  .hero-badge {
    display: inline-block;
    padding: 7px 18px;
    background: rgba(200, 150, 62, 0.15);
    border: 1px solid rgba(200, 150, 62, 0.4);
    border-radius: 40px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
    animation: fadeUp 1s ease 0.2s both;
  }

  .hero-title {
    font-size: clamp(44px, 8vw, 86px);
    font-weight: 700;
    color: var(--dark-brown);
    line-height: 1.12;
    letter-spacing: -2px;
    margin-bottom: 24px;
    animation: fadeUp 1s ease 0.4s both;
  }

  .hero-title em {
    font-style: normal;
    color: var(--warm-brown);
    position: relative;
  }

  .hero-title em::after {
    content: '';
    position: absolute;
    bottom: 4px; left: 0;
    width: 100%;
    height: 3px;
    background: var(--gold);
    border-radius: 2px;
    opacity: 0.6;
  }

  .hero-subtitle {
    font-size: clamp(15px, 2.5vw, 20px);
    font-weight: 300;
    color: var(--muted);
    line-height: 1.7;
    max-width: 520px;
    margin: 0 auto 44px;
    animation: fadeUp 1s ease 0.6s both;
  }

  .hero-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 1s ease 0.8s both;
  }

  .btn-primary {
    padding: 16px 36px;
    background: var(--warm-brown);
    color: var(--cream);
    border-radius: 50px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(107, 66, 38, 0.3);
  }

  .btn-primary:hover {
    background: var(--dark-brown);
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(107, 66, 38, 0.4);
  }

  .btn-secondary {
    padding: 16px 36px;
    background: transparent;
    color: var(--warm-brown);
    border: 1.5px solid rgba(107, 66, 38, 0.35);
    border-radius: 50px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
  }

  .btn-secondary:hover {
    background: rgba(107, 66, 38, 0.06);
    border-color: var(--warm-brown);
    transform: translateY(-2px);
  }

  .scroll-indicator {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeUp 1s ease 1.2s both;
  }

  .scroll-indicator span {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--muted), transparent);
    animation: scrollPulse 2s ease infinite;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.1); }
  }

  /* MARQUEE STRIP */
  .marquee-strip {
    width: 100%;
    background: var(--warm-brown);
    padding: 14px 0;
    overflow: hidden;
    display: flex;
  }

  .marquee-track {
    display: flex;
    gap: 0;
    animation: marquee 20s linear infinite;
    white-space: nowrap;
  }

  .marquee-track span {
    font-size: 13px;
    font-weight: 400;
    color: rgba(245, 236, 215, 0.75);
    letter-spacing: 0.08em;
    padding: 0 28px;
  }

  .marquee-track span.dot {
    color: var(--gold);
    padding: 0;
  }

  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* SECTION COMMONS */
  section {
    padding: 110px 40px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }

  .section-title {
    font-size: clamp(30px, 5vw, 52px);
    font-weight: 700;
    color: var(--dark-brown);
    line-height: 1.2;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }

  .section-desc {
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    line-height: 1.8;
    max-width: 520px;
  }

  /* ABOUT */
  #about {
    background: var(--light-cream);
  }

  .about-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-visual {
    position: relative;
    height: 460px;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--cream) 0%, rgba(200,150,62,0.2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .about-visual-inner {
    text-align: center;
  }

  .about-visual-icon {
    font-size: 80px;
    line-height: 1;
    margin-bottom: 16px;
    display: block;
  }

  .about-visual-text {
    font-size: 18px;
    font-weight: 500;
    color: var(--warm-brown);
    opacity: 0.6;
    letter-spacing: 0.04em;
  }

  .about-visual::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 240px; height: 240px;
    border-radius: 50%;
    background: rgba(200, 150, 62, 0.12);
  }

  .about-visual::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(107, 66, 38, 0.08);
  }

  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 48px;
  }

  .stat-card {
    padding: 24px;
    background: var(--soft-white);
    border-radius: 16px;
    border: 1px solid rgba(107, 66, 38, 0.08);
  }

  .stat-number {
    font-size: 36px;
    font-weight: 700;
    color: var(--warm-brown);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
  }

  /* SERVICES */
  #services {
    background: var(--soft-white);
  }

  .services-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .services-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 60px;
    flex-wrap: wrap;
    gap: 20px;
  }

  .services-grid {
    display: grid;
