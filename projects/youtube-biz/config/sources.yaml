        - "TechCrunch AI"
        - "The Information AI"
        - "Forbes AI"
      keywords:
        - "AI funding"
        - "AI acquisition"
        - "AI startup"
        - "AI market"
    ai_trends:
      sources:
        - "Product Hunt AI"
        - "Hacker News AI"
