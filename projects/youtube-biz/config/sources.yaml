sources:
  first_mover_ai_youtube:
    # 해외 AI 영상 번역용 — Fair Use 기반 재편집
    viral_channels:
      - "@mreflow"              # Matt Wolfe
      - "@aiexplained-official" # AI Explained
      - "@TwoMinutePapers"
      - "@mkbhd"                # MKBHD (AI 리뷰만)
      - "@FireshipIo"
      - "@AI-Jason"
      - "@theAIadvantage"
      - "@LexFridman"           # AI/tech 에피소드
      - "@DavidShapiroAutomator"
